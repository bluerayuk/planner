<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f13;
  --surface: #17171d;
  --surface2: #1e1e26;
  --surface3: #26262f;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f5;
  --text2: #9090a8;
  --text3: #56566a;
  --accent: #7c6af7;
  --accent-dim: rgba(124,106,247,0.13);
  --accent-glow: rgba(124,106,247,0.28);
  --high: #ff6b6b;
  --high-bg: rgba(255,107,107,0.1);
  --med: #ffa94d;
  --med-bg: rgba(255,169,77,0.1);
  --low: #51cf66;
  --low-bg: rgba(81,207,102,0.1);
  --radius: 10px;
  --radius-sm: 6px;
  --sidebar-w: 260px;
  --nav-h: 64px;
}

html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; overflow: hidden; }

/* ════════════════════════════════════════
   DESKTOP LAYOUT  (≥ 640px)
════════════════════════════════════════ */
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header { padding: 22px 18px 14px; border-bottom: 1px solid var(--border); }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon { width: 34px; height: 34px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; color: #fff; flex-shrink: 0; }
.brand-name { font-size: 16px; font-weight: 600; letter-spacing: -.3px; }
.brand-date { font-size: 11px; color: var(--text3); margin-top: 3px; }
.sidebar-scroll { flex: 1; overflow-y: auto; padding-bottom: 8px; }
.sidebar-scroll::-webkit-scrollbar { width: 3px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.sidebar-section { padding: 18px 10px 4px; }
.section-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); padding: 0 8px; margin-bottom: 3px; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; color: var(--text2); transition: background .12s, color .12s; position: relative; user-select: none; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--text); }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 60%; background: var(--accent); border-radius: 0 3px 3px 0; }
.nav-icon { font-size: 15px; width: 17px; text-align: center; flex-shrink: 0; }
.nav-count { margin-left: auto; font-size: 11px; font-weight: 500; background: var(--surface3); color: var(--text3); padding: 1px 7px; border-radius: 20px; min-width: 22px; text-align: center; }
.nav-item.active .nav-count { background: var(--accent-glow); color: var(--accent); }
.list-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sidebar-footer { padding: 10px; border-top: 1px solid var(--border); }
.new-list-btn { width: 100%; display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px dashed var(--border2); background: none; color: var(--text3); font-size: 13px; cursor: pointer; transition: all .12s; font-family: inherit; }
.new-list-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* Main panel */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
.topbar { display: flex; align-items: center; gap: 14px; padding: 16px 26px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.topbar-left { flex: 1; display: flex; align-items: center; gap: 11px; }
.topbar-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.topbar-title { font-size: 19px; font-weight: 600; letter-spacing: -.4px; }
.topbar-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
.topbar-right { display: flex; gap: 6px; }
.icon-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .12s; }
.icon-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

/* Stats */
.stats-strip { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.stat-cell { flex: 1; padding: 13px 26px; border-right: 1px solid var(--border); }
.stat-cell:last-child { border-right: none; }
.stat-val { font-size: 26px; font-weight: 600; letter-spacing: -1px; }
.stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: .06em; }
.progress-wrap { margin-top: 8px; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .5s cubic-bezier(.4,0,.2,1); }

/* Task area */
.task-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 22px 26px; gap: 14px; }
.add-row { display: flex; gap: 8px; flex-shrink: 0; }
.add-input { flex: 1; padding: 9px 13px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color .12s; }
.add-input::placeholder { color: var(--text3); }
.add-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.add-select { padding: 9px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); font-size: 13px; font-family: inherit; cursor: pointer; outline: none; }
.add-select:focus { border-color: var(--accent); }
.add-btn { padding: 9px 18px; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; white-space: nowrap; transition: opacity .12s, transform .08s; }
.add-btn:hover { opacity: .88; }
.add-btn:active { transform: scale(.97); }

/* Filter bar */
.filter-bar { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.ftab { padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--text2); font-size: 12px; font-family: inherit; cursor: pointer; transition: all .12s; }
.ftab:hover { border-color: var(--border2); color: var(--text); }
.ftab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-end { margin-left: auto; }
.sort-btn { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text3); border: none; background: none; cursor: pointer; font-family: inherit; padding: 5px 8px; border-radius: var(--radius-sm); transition: color .12s, background .12s; }
.sort-btn:hover { color: var(--text2); background: var(--surface); }

/* Task list */
.task-scroll { flex: 1; overflow-y: auto; }
.task-scroll::-webkit-scrollbar { width: 4px; }
.task-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.group-head { display: flex; align-items: center; gap: 8px; margin: 4px 0 8px; }
.group-head:not(:first-child) { margin-top: 22px; }
.group-name { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); white-space: nowrap; }
.group-line { flex: 1; height: 1px; background: var(--border); }
.group-ct { font-size: 10px; color: var(--text3); }
.task { display: flex; align-items: flex-start; gap: 11px; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; background: var(--surface); transition: border-color .12s, opacity .15s; }
.task:hover { border-color: var(--border2); }
.task.done { opacity: .42; }
.check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; font-size: 11px; color: transparent; background: none; }
.check:hover { border-color: var(--accent); color: var(--accent); }
.check.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 14px; color: var(--text); line-height: 1.4; }
.task.done .task-text { text-decoration: line-through; color: var(--text3); }
.task-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; margin-top: 5px; }
.pill { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
.pill-high { background: var(--high-bg); color: var(--high); }
.pill-med { background: var(--med-bg); color: var(--med); }
.pill-low { background: var(--low-bg); color: var(--low); }
.pill-list { background: var(--surface3); color: var(--text2); }
.pill-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.task-age { font-size: 11px; color: var(--text3); margin-left: auto; white-space: nowrap; }
.del-btn { width: 26px; height: 26px; border: none; background: none; border-radius: var(--radius-sm); color: var(--text3); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .12s, background .12s, color .12s; flex-shrink: 0; }
.task:hover .del-btn { opacity: 1; }
.del-btn:hover { background: var(--high-bg); color: var(--high); }
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 52px 20px; color: var(--text3); gap: 8px; text-align: center; }
.empty-icon { font-size: 44px; opacity: .25; }

/* Mobile nav (hidden on desktop) */
.mobile-nav { display: none; }
.mobile-overlay { display: none; }
.mobile-drawer { display: none; }
.mobile-topbar { display: none; }

/* ════════════════════════════════════════
   MOBILE LAYOUT  (< 640px)
════════════════════════════════════════ */
@media (max-width: 639px) {
  html, body { overflow: hidden; }

  .app { flex-direction: column; height: 100dvh; height: 100vh; }

  /* Hide desktop sidebar */
  .sidebar { display: none; }

  /* Mobile topbar */
  .mobile-topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .mobile-menu-btn { width: 34px; height: 34px; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .mobile-title-wrap { flex: 1; }
  .mobile-view-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .mobile-view-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .mobile-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* Hide desktop topbar */
  .topbar { display: none; }

  /* Stats — compact on mobile */
  .stats-strip { overflow-x: auto; flex-shrink: 0; }
  .stat-cell { padding: 10px 16px; min-width: 90px; }
  .stat-val { font-size: 22px; }

  /* Task area */
  .task-area { padding: 14px 14px 10px; gap: 10px; }

  /* Add row stacks on mobile */
  .add-row { flex-wrap: wrap; }
  .add-input { min-width: 0; flex: 1 1 100%; }
  .add-select { flex: 1; font-size: 12px; padding: 8px 8px; }
  .add-btn { flex: 1; justify-content: center; padding: 9px 12px; }

  /* Tasks: touch-friendly */
  .task { padding: 12px 12px; }
  .del-btn { opacity: 1; }
  .check { width: 22px; height: 22px; }

  /* Bottom nav bar */
  .mobile-nav {
    display: flex;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    height: var(--nav-h);
    padding: 0 4px;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .mob-nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; background: none; border: none; cursor: pointer;
    font-size: 18px; color: var(--text3); font-family: inherit;
    border-radius: var(--radius-sm); transition: color .12s;
    padding: 6px 2px;
  }
  .mob-nav-btn.active { color: var(--accent); }
  .mob-nav-label { font-size: 10px; font-weight: 500; }
  .mob-nav-badge { position: absolute; top: 6px; right: calc(50% - 18px); width: 16px; height: 16px; background: var(--accent); border-radius: 50%; font-size: 9px; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; }
  .mob-nav-btn { position: relative; }

  /* Slide-up drawer (lists) */
  .mobile-overlay {
    display: block; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 40;
    opacity: 0; pointer-events: none; transition: opacity .22s;
  }
  .mobile-overlay.open { opacity: 1; pointer-events: all; }

  .mobile-drawer {
    display: flex; flex-direction: column;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 18px 18px 0 0;
    border-top: 1px solid var(--border2);
    z-index: 50;
    max-height: 78vh;
    transform: translateY(100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .mobile-drawer.open { transform: translateY(0); }
  .drawer-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 4px; flex-shrink: 0; }
  .drawer-title { font-size: 13px; font-weight: 600; color: var(--text2); padding: 6px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .drawer-scroll { overflow-y: auto; padding: 10px; flex: 1; }
  .drawer-footer { padding: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
}

/* Toast */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-size: 13px; padding: 9px 18px;
  border-radius: var(--radius); opacity: 0;
  transition: all .2s; pointer-events: none; white-space: nowrap; z-index: 99;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (min-width: 640px) {
  .toast { bottom: 20px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- ── DESKTOP SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">✦</div>
        <div>
          <div class="brand-name">Planner</div>
          <div class="brand-date" id="date-lbl"></div>
        </div>
      </div>
    </div>
    <div class="sidebar-scroll">
      <div class="sidebar-section">
        <div class="section-label">Views</div>
        <div class="nav-item active" data-view="all" onclick="setView('all',this)">
          <span class="nav-icon">◈</span> All tasks <span class="nav-count" id="ct-all">0</span>
        </div>
        <div class="nav-item" data-view="today" onclick="setView('today',this)">
          <span class="nav-icon">◑</span> Today <span class="nav-count" id="ct-today">0</span>
        </div>
        <div class="nav-item" data-view="high" onclick="setView('high',this)">
          <span class="nav-icon">▲</span> High priority <span class="nav-count" id="ct-high">0</span>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="section-label">Lists</div>
        <div id="list-nav"></div>
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="new-list-btn" onclick="addList()">+ New list</button>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- Mobile topbar (hidden on desktop) -->
    <div class="mobile-topbar">
      <button class="mobile-menu-btn" onclick="openDrawer()" aria-label="Open lists">☰</button>
      <div class="mobile-title-wrap">
        <div class="mobile-view-title">
          <span class="mobile-dot" id="mob-dot"></span>
          <span id="mob-title">All tasks</span>
        </div>
        <div class="mobile-view-sub" id="mob-sub"></div>
      </div>
      <button class="icon-btn" onclick="document.getElementById('task-input').focus()" aria-label="Search">⌕</button>
    </div>

    <!-- Desktop topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-dot" id="tb-dot"></span>
        <div>
          <div class="topbar-title" id="tb-title">All tasks</div>
          <div class="topbar-sub" id="tb-sub"></div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="document.getElementById('task-input').focus()" aria-label="Focus input">⌕</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-strip">
      <div class="stat-cell"><div class="stat-val" id="s-open">0</div><div class="stat-label">Open</div></div>
      <div class="stat-cell"><div class="stat-val" id="s-done">0</div><div class="stat-label">Done</div></div>
      <div class="stat-cell">
        <div class="stat-val" id="s-pct">0%</div><div class="stat-label">Complete</div>
        <div class="progress-wrap"><div class="progress-fill" id="s-bar" style="width:0%"></div></div>
      </div>
      <div class="stat-cell"><div class="stat-val" id="s-total">0</div><div class="stat-label">Total</div></div>
    </div>

    <!-- Tasks -->
    <div class="task-area">
      <div class="add-row">
        <input id="task-input" class="add-input" type="text" placeholder="Add a task… press Enter" onkeydown="if(event.key==='Enter')addTask()">
        <select id="task-prio" class="add-select">
          <option value="med">Medium</option>
          <option value="high">▲ High</option>
          <option value="low">▼ Low</option>
        </select>
        <select id="task-list-sel" class="add-select"></select>
        <button class="add-btn" onclick="addTask()">+ Add</button>
      </div>

      <div class="filter-bar">
        <button class="ftab active" onclick="setTab('open',this)">Open</button>
        <button class="ftab" onclick="setTab('done',this)">Done</button>
        <button class="ftab" onclick="setTab('all',this)">All</button>
        <div class="filter-end">
          <button class="sort-btn" onclick="cycleSort()">⇅ <span id="sort-lbl">Priority</span></button>
        </div>
      </div>

      <div class="task-scroll" id="task-list"></div>
    </div>
  </main>

  <!-- ── MOBILE BOTTOM NAV ── -->
  <nav class="mobile-nav" aria-label="Main navigation">
    <button class="mob-nav-btn active" id="mn-all" onclick="mobNav('all',this)" aria-label="All tasks">
      <span>◈</span><span class="mob-nav-label">All</span>
      <span class="mob-nav-badge" id="mob-badge">0</span>
    </button>
    <button class="mob-nav-btn" id="mn-today" onclick="mobNav('today',this)" aria-label="Today">
      <span>◑</span><span class="mob-nav-label">Today</span>
    </button>
    <button class="mob-nav-btn" id="mn-high" onclick="mobNav('high',this)" aria-label="High priority">
      <span>▲</span><span class="mob-nav-label">Priority</span>
    </button>
    <button class="mob-nav-btn" id="mn-lists" onclick="openDrawer()" aria-label="Lists">
      <span>☰</span><span class="mob-nav-label">Lists</span>
    </button>
  </nav>
</div>

<!-- Mobile overlay + drawer -->
<div class="mobile-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="mobile-drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">My lists</div>
  <div class="drawer-scroll">
    <div class="nav-item active" data-view="all" onclick="setViewMob('all',this)">
      <span class="nav-icon">◈</span> All tasks <span class="nav-count" id="d-ct-all">0</span>
    </div>
    <div class="nav-item" data-view="today" onclick="setViewMob('today',this)">
      <span class="nav-icon">◑</span> Today <span class="nav-count" id="d-ct-today">0</span>
    </div>
    <div class="nav-item" data-view="high" onclick="setViewMob('high',this)">
      <span class="nav-icon">▲</span> High priority <span class="nav-count" id="d-ct-high">0</span>
    </div>
    <div style="height:10px"></div>
    <div id="drawer-list-nav"></div>
  </div>
  <div class="drawer-footer">
    <button class="new-list-btn" onclick="addList()">+ New list</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LISTS_DEFAULT = [
  {id:'work', name:'Work', color:'#5b9cf6'},
  {id:'personal', name:'Personal', color:'#51cf66'},
  {id:'shopping', name:'Shopping', color:'#ff9f43'},
];
const LIST_COLORS = ['#7c6af7','#f06595','#fcc419','#20c997','#f76707','#4dabf7'];

let tasks = [
  {id:1, text:'Review quarterly report', listId:'work', priority:'high', done:false, ts:Date.now()-86400000},
  {id:2, text:'Book dentist appointment', listId:'personal', priority:'med', done:false, ts:Date.now()-3600000},
  {id:3, text:'Prepare slides for Monday meeting', listId:'work', priority:'high', done:false, ts:Date.now()-7200000},
  {id:4, text:'Buy groceries — milk, bread, eggs', listId:'shopping', priority:'low', done:false, ts:Date.now()-1800000},
  {id:5, text:'Call back Sarah', listId:'personal', priority:'med', done:true, ts:Date.now()-172800000},
  {id:6, text:'Update project roadmap', listId:'work', priority:'med', done:false, ts:Date.now()-600000},
];
let lists = [...LISTS_DEFAULT];
let nextId = 7;
let view = 'all';
let tab = 'open';
let sort = 'priority';
const SORTS = ['priority','newest','oldest'];
const SORT_LABELS = {priority:'Priority', newest:'Newest', oldest:'Oldest'};

const gl = id => lists.find(l=>l.id===id);
const isToday = ts => { const d=new Date(ts),n=new Date(); return d.toDateString()===n.toDateString(); };
const ago = ts => {
  const d = Date.now()-ts;
  if(d<60000) return 'now';
  if(d<3600000) return Math.floor(d/60000)+'m';
  if(d<86400000) return Math.floor(d/3600000)+'h';
  return Math.floor(d/86400000)+'d';
};

function scopeTasks() {
  let t = tasks;
  if(view==='today') t=t.filter(x=>isToday(x.ts));
  else if(view==='high') t=t.filter(x=>x.priority==='high');
  else if(view!=='all') t=t.filter(x=>x.listId===view);
  return t;
}
function getFiltered() {
  let t = scopeTasks();
  if(tab==='open') t=t.filter(x=>!x.done);
  else if(tab==='done') t=t.filter(x=>x.done);
  const po={high:0,med:1,low:2};
  if(sort==='priority') t=[...t].sort((a,b)=>po[a.priority]-po[b.priority]);
  else if(sort==='newest') t=[...t].sort((a,b)=>b.ts-a.ts);
  else t=[...t].sort((a,b)=>a.ts-b.ts);
  return t;
}

function render() { renderSidebar(); renderStats(); renderTasks(); }

function renderSidebar() {
  const open = tasks.filter(t=>!t.done);
  const counts = {all:open.length, today:open.filter(t=>isToday(t.ts)).length, high:open.filter(t=>t.priority==='high').length};

  ['all','today','high'].forEach(k => {
    const e1 = document.getElementById('ct-'+k);
    const e2 = document.getElementById('d-ct-'+k);
    if(e1) e1.textContent = counts[k];
    if(e2) e2.textContent = counts[k];
  });

  // Mobile badge
  const badge = document.getElementById('mob-badge');
  if(badge) badge.textContent = counts.all;

  let listHtml = '';
  let drawerListHtml = '';
  lists.forEach(l => {
    const c = open.filter(t=>t.listId===l.id).length;
    const activeClass = view===l.id ? ' active' : '';
    const item = `<div class="nav-item${activeClass}" data-view="${l.id}" onclick="setView('${l.id}',this)">
      <span class="list-dot" style="background:${l.color}"></span>${l.name}<span class="nav-count">${c}</span></div>`;
    const ditem = `<div class="nav-item${activeClass}" data-view="${l.id}" onclick="setViewMob('${l.id}',this)">
      <span class="list-dot" style="background:${l.color}"></span>${l.name}<span class="nav-count">${c}</span></div>`;
    listHtml += item;
    drawerListHtml += ditem;
  });
  document.getElementById('list-nav').innerHTML = listHtml;
  document.getElementById('drawer-list-nav').innerHTML = drawerListHtml;

  const showSel = view==='all'||view==='today'||view==='high';
  const sel = document.getElementById('task-list-sel');
  sel.innerHTML = lists.map(l=>`<option value="${l.id}">${l.name}</option>`).join('');
  sel.style.display = showSel ? '' : 'none';

  // Sync active state in desktop nav
  document.querySelectorAll('.sidebar .nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.view===view);
  });
  // Sync active state in drawer
  document.querySelectorAll('.mobile-drawer .nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.view===view);
  });
}

function renderStats() {
  const scope = scopeTasks();
  const done = scope.filter(t=>t.done).length;
  const openN = scope.length-done;
  const pct = scope.length ? Math.round(done/scope.length*100) : 0;
  document.getElementById('s-open').textContent = openN;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-pct').textContent = pct+'%';
  document.getElementById('s-total').textContent = scope.length;
  document.getElementById('s-bar').style.width = pct+'%';

  const names = {all:'All tasks', today:"Today", high:'High priority'};
  const name = names[view] || (gl(view)||{name:''}).name;
  const color = view==='all'?'#7c6af7': view==='today'?'#ffa94d': view==='high'?'#ff6b6b':(gl(view)||{color:'#7c6af7'}).color;

  const sub = `${openN} remaining · ${done} done`;
  document.getElementById('tb-title').textContent = name;
  document.getElementById('tb-sub').textContent = sub;
  document.getElementById('tb-dot').style.cssText = `background:${color};box-shadow:0 0 6px ${color}88`;

  // Mobile topbar
  const mobTitle = document.getElementById('mob-title');
  const mobSub = document.getElementById('mob-sub');
  const mobDot = document.getElementById('mob-dot');
  if(mobTitle) mobTitle.textContent = name;
  if(mobSub) mobSub.textContent = sub;
  if(mobDot) mobDot.style.background = color;

  document.getElementById('sort-lbl').textContent = SORT_LABELS[sort];
}

function renderTasks() {
  const t = getFiltered();
  const el = document.getElementById('task-list');
  if(!t.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">✓</div><div>${tab==='done'?'No completed tasks yet.':'Nothing here — add a task above.'}</div></div>`;
    return;
  }
  const showList = view==='all'||view==='today'||view==='high';
  let html = '';
  if(tab!=='done' && sort==='priority') {
    [['high','High priority'],['med','Medium priority'],['low','Low priority']].forEach(([p,label]) => {
      const g = t.filter(x=>x.priority===p);
      if(!g.length) return;
      html += `<div class="group-head"><span class="group-name">${label}</span><span class="group-line"></span><span class="group-ct">${g.length}</span></div>`;
      g.forEach(x => { html += taskEl(x, showList); });
    });
  } else {
    t.forEach(x => { html += taskEl(x, showList); });
  }
  el.innerHTML = html;
}

function taskEl(t, showList) {
  const list = gl(t.listId);
  const pills = {high:`<span class="pill pill-high">▲ High</span>`, med:`<span class="pill pill-med">◆ Med</span>`, low:`<span class="pill pill-low">▼ Low</span>`};
  return `<div class="task${t.done?' done':''}" id="t${t.id}">
    <div class="check${t.done?' on':''}" onclick="toggle(${t.id})" role="checkbox" aria-checked="${t.done}" aria-label="Mark done">✓</div>
    <div class="task-body">
      <div class="task-text">${t.text}</div>
      <div class="task-meta">
        ${pills[t.priority]||''}
        ${showList&&list?`<span class="pill pill-list"><span class="pill-dot" style="background:${list.color}"></span>${list.name}</span>`:''}
        <span class="task-age">${ago(t.ts)}</span>
      </div>
    </div>
    <button class="del-btn" onclick="del(${t.id})" aria-label="Delete">✕</button>
  </div>`;
}

function setView(v, el) {
  view = v;
  render();
}
function setViewMob(v, el) {
  view = v;
  closeDrawer();
  // sync bottom nav
  document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('active'));
  const map = {all:'mn-all', today:'mn-today', high:'mn-high'};
  if(map[v]) document.getElementById(map[v])?.classList.add('active');
  render();
}
function mobNav(v, el) {
  view = v;
  document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setTab(t, el) {
  tab = t;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  render();
}
function cycleSort() {
  sort = SORTS[(SORTS.indexOf(sort)+1)%SORTS.length];
  render();
}
function addTask() {
  const input = document.getElementById('task-input');
  const text = (input?.value||'').trim();
  if(!text) { input?.focus(); return; }
  const priority = document.getElementById('task-prio')?.value||'med';
  const showSel = view==='all'||view==='today'||view==='high';
  let listId = showSel ? (document.getElementById('task-list-sel')?.value||lists[0].id) : view;
  if(!lists.find(l=>l.id===listId)) listId = lists[0].id;
  tasks.unshift({id:nextId++, text, listId, priority, done:false, ts:Date.now()});
  input.value = '';
  render();
  input.focus();
  showToast('Task added');
}
function toggle(id) {
  const t = tasks.find(x=>x.id===id);
  if(t) { t.done=!t.done; render(); showToast(t.done?'Done ✓':'Reopened'); }
}
function del(id) {
  tasks = tasks.filter(x=>x.id!==id);
  render();
  showToast('Deleted');
}
function addList() {
  const name = prompt('New list name:');
  if(!name?.trim()) return;
  const color = LIST_COLORS[lists.length%LIST_COLORS.length];
  lists.push({id:'list-'+Date.now(), name:name.trim(), color});
  render();
}
function openDrawer() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), 1600);
}

document.getElementById('date-lbl').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
render();
</script>
</body>
</html>
